<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>우리의 성장 스토리</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { 
            font-family: 'Noto Sans KR', sans-serif; 
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%); 
            margin: 0; 
            padding: 0; 
            display: flex; 
            justify-content: center; 
            min-height: 100vh;
            color: #333;
        }
        .container {
            width: 90%;
            max-width: 450px;
            padding: 50px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h2 { font-weight: 700; font-size: 24px; margin-bottom: 10px; color: #5d5d5d; letter-spacing: -1px; }
        .subtitle { font-size: 15px; color: #888; margin-bottom: 40px; text-align: center; line-height: 1.4; }
        .story-form-card {
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            box-sizing: border-box;
        }
        
        /* 학번과 이름을 나란히 배치하기 위한 스타일 */
        .info-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .info-group input {
            margin-bottom: 0; /* 내부 마진 제거 */
        }

        input, textarea { 
            width: 100%; 
            margin-bottom: 20px; 
            padding: 15px; 
            font-size: 16px; 
            border: 1px solid #e0e0e0; 
            border-radius: 12px; 
            background-color: #f9f9f9; 
            box-sizing: border-box; 
            outline: none; 
            transition: all 0.3s ease;
            font-family: inherit;
        }
        input:focus, textarea:focus {
            border-color: #ff9a9e; 
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(255, 154, 158, 0.15);
        }
        button { 
            width: 100%; 
            background: linear-gradient(to right, #ff9a9e 0%, #fad0c4 99%, #fad0c4 100%);
            color: white; 
            border: none; 
            padding: 16px; 
            border-radius: 12px; 
            font-size: 17px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: transform 0.1s, box-shadow 0.2s;
            box-shadow: 0 5px 15px rgba(255, 154, 158, 0.3);
        }
        button:active { transform: scale(0.98); } 
        button:disabled { background: #ccc; box-shadow: none; cursor: not-allowed; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h2>실패는 성공의 어머니 🌱</h2>
        <p class="subtitle">나의 실패했던 경험과,<br>그때 나를 도와준 고마운 친구에게 마음을 전하세요.</p>
        
        <div class="story-form-card">
            <div class="info-group">
                <input type="text" id="authorName" placeholder="내 이름">
                <input type="text" id="studentId" placeholder="학번 (4자리)" maxlength="4">
            </div>

            <input type="text" id="friendName" placeholder="고마운 친구의 이름">
            <textarea id="storyText" rows="6" placeholder="당신의 따뜻한 이야기를 적어주세요..."></textarea>
            
            <button id="submitBtn" onclick="sendStory()">마음 보내기</button>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://tjeyaqrxepbjyhgeaxwp.supabase.co';
        const supabaseKey = 'sb_publishable_dvsOaA9JN3S6Mk11WKJOOQ_uIib6Cia';
        const db = window.supabase.createClient(supabaseUrl, supabaseKey);

        async function sendStory() {
            const authorName = document.getElementById('authorName').value.trim();
            const studentId = document.getElementById('studentId').value.trim();
            const friend = document.getElementById('friendName').value.trim();
            const text = document.getElementById('storyText').value.trim();
            const submitBtn = document.getElementById('submitBtn');
            
            // 1. 입력값 확인
            if(!authorName || !studentId || !text || !friend) {
                alert("모든 항목을 빠짐없이 적어주세요!");
                return;
            }

            // 2. 학번 4자리 유효성 검사 (숫자로만 이루어져 있는지 확인)
            const idPattern = /^[0-9]{4}$/;
            if (!idPattern.test(studentId)) {
                alert("학번은 숫자 4자리로 입력해주세요. (예: 1234)");
                return;
            }

            // 중복 클릭 방지
            submitBtn.disabled = true;
            submitBtn.innerText = "전송 중...";

            try {
                // 3. 사용자의 IP 주소 가져오기
                let userIp = 'Unknown';
                try {
                    const ipResponse = await fetch('https://api.ipify.org?format=json');
                    const ipData = await ipResponse.json();
                    userIp = ipData.ip;
                } catch (ipError) {
                    console.warn("IP 수집 실패:", ipError);
                    // IP를 가져오지 못하더라도 데이터 전송은 계속 진행하도록 처리
                }

                // 4. Supabase에 데이터 저장
                const { error } = await db
                    .from('stories')
                    .insert([{ 
                        author_name: authorName,
                        student_id: studentId,
                        text: text, 
                        friend: friend,
                        ip_address: userIp
                    }]);
                
                if (error) {
                    alert("❌ 슈파베이스 에러: " + error.message);
                    console.error(error);
                } else {
                    alert("사연이 따뜻하게 접수되었습니다!");
                    // 폼 초기화
                    document.getElementById('authorName').value = '';
                    document.getElementById('studentId').value = '';
                    document.getElementById('friendName').value = '';
                    document.getElementById('storyText').value = '';
                }
            } catch (err) {
                alert("⚠️ 에러가 발생했습니다: " + err.message);
                console.error(err);
            } finally {
                // 버튼 상태 복구
                submitBtn.disabled = false;
                submitBtn.innerText = "마음 보내기";
            }
        }
    </script>
</body>
</html>
