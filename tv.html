<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>우리의 성장 스토리 - TV</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { 
            font-family: 'Noto Sans KR', sans-serif; 
            background-color: #fdfdfd; 
            color: #333333; 
            margin: 0; 
            padding: 80px 60px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        h1 { 
            font-size: 48px; 
            font-weight: 700; 
            margin-bottom: 70px; 
            letter-spacing: -1.5px; 
            background: linear-gradient(to right, #ff758c 0%, #ff7eb3 100%);
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }
        #tv-list { width: 100%; max-width: 1000px; padding-bottom: 200px; }
        
        .story-card { 
            background-color: #ffffff; 
            padding: 40px; 
            margin-bottom: 40px; 
            border-radius: 25px; 
            border: 1px solid #f0f0f0; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
            position: relative; 
            overflow: hidden; 
            opacity: 0;
            transform: translateY(30px);
            animation: slideUp 0.8s ease forwards;
        }
        .story-card::before { 
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 5px; 
            background: linear-gradient(to right, #ff9a9e 0%, #fad0c4 100%); 
        }
        .text { font-size: 32px; line-height: 1.6; font-weight: 500; margin-bottom: 30px; word-break: keep-all; color: #444444; }
        .friend { color: #888888; font-size: 24px; font-weight: 600; text-align: right; font-style: italic; }

        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* QR 코드 컨테이너 */
        #qr-container {
            position: fixed;
            bottom: 50px;
            right: 50px;
            background: #ffffff;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            text-align: center;
            z-index: 1000;
            border: 2px solid #ffedf0;
        }
        #qr-container p { margin: 0 0 15px 0; font-size: 18px; font-weight: 700; color: #ff758c; letter-spacing: -0.5px; }
        #qrcode { display: flex; justify-content: center; }

        /* 🌟 크게 보기(하이라이트 팝업) 디자인 🌟 */
        #highlight-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(253, 253, 253, 0.96); 
            z-index: 2000; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden; /* 완전히 숨김 처리 추가 */
            transition: opacity 1s ease, visibility 1s ease;
        }
        #highlight-overlay.active {
            opacity: 1;
            visibility: visible; /* 활성화 시 보이게 설정 */
        }
        .highlight-card {
            background: white;
            padding: 80px;
            border-radius: 40px;
            box-shadow: 0 25px 60px rgba(255, 117, 140, 0.2);
            max-width: 1200px;
            width: 90%;
            text-align: center;
            border: 3px solid #ff758c;
            transform: scale(0.9);
            transition: transform 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #highlight-overlay.active .highlight-card {
            transform: scale(1); 
        }
        #highlight-text {
            font-size: 55px; 
            line-height: 1.5;
            color: #222;
            margin-bottom: 50px;
            word-break: keep-all;
            font-weight: 700;
        }
        #highlight-friend {
            font-size: 38px;
            color: #ff758c;
            font-weight: 700;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
    <h1>🌟 우리의 실패와 성장 스토리 🌟</h1>
    <div id="tv-list"></div>

    <div id="qr-container">
        <p>📷 스캔하여 사연 남기기</p>
        <div id="qrcode"></div>
    </div>

    <div id="highlight-overlay">
        <div class="highlight-card">
            <div id="highlight-text">"사연 내용이 들어갑니다."</div>
            <div id="highlight-friend">- 나를 도와준 친구에게 -</div>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://tjeyaqrxepbjyhgeaxwp.supabase.co';
        const supabaseKey = 'sb_publishable_dvsOaA9JN3S6Mk11WKJOOQ_uIib6Cia';
        const db = window.supabase.createClient(supabaseUrl, supabaseKey);
        const tvListDiv = document.getElementById('tv-list');

        const qrLink = "https://muryonghs.github.io/mrhs-story/"; 
        new QRCode(document.getElementById("qrcode"), {
            text: qrLink, width: 150, height: 150, 
            colorDark : "#333333", colorLight : "#ffffff", 
            correctLevel : QRCode.CorrectLevel.H 
        });

        let allStories = [];
        let isHighlighting = false; 
        let isScrollingUp = false; // 위로 스크롤 중인지 확인하는 변수 추가
        let highlightIndex = 0;     

        async function fetchStories() {
            const { data, error } = await db
                .from('stories')
                .select('*')
                .order('created_at', { ascending: false }); 
            
            if (data) {
                allStories = data; 
                tvListDiv.innerHTML = '';
                data.forEach((story, index) => {
                    const div = document.createElement('div');
                    div.className = 'story-card';
                    div.style.animationDelay = `${index * 0.3}s`;
                    div.innerHTML = `
                        <div class="text">"${story.text.replace(/\n/g, '<br>')}"</div>
                        <div class="friend">- 나를 도와준 ${story.friend}에게 -</div>
                    `;
                    tvListDiv.appendChild(div);
                });
            }
        }

        fetchStories();

        db.channel('public:stories')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'stories' }, payload => {
                fetchStories();
            })
            .subscribe();

        // ----------------------------------------------------
        // [수정 완료] 오토 스크롤 기능 (충돌 방지 및 소수점 처리)
        // ----------------------------------------------------
        function startAutoScroll() {
            setInterval(() => {
                // 팝업이 떠있거나, 화면이 위로 올라가고 있을 때는 작동 금지
                if (isHighlighting || isScrollingUp) return; 

                // 소수점 오차를 없애기 위해 Math.ceil 사용
                const currentScroll = Math.ceil(window.scrollY); 
                const maxScroll = document.documentElement.scrollHeight - window.innerHeight;

                if (maxScroll > 0) { 
                    // 여유 있게 2픽셀 전에 바닥 도착으로 인식
                    if (currentScroll >= maxScroll - 2) {
                        isScrollingUp = true; // 스크롤업 상태 켜기
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                        
                        // 화면이 맨 위로 올라갈 시간을 주고 1.5초 뒤에 다시 스크롤 허용
                        setTimeout(() => {
                            isScrollingUp = false;
                        }, 1500);
                    } else {
                        window.scrollBy(0, 1);
                    }
                }
            }, 30);
        }

        // 페이지 열리고 3초 뒤 스크롤 시작
        setTimeout(startAutoScroll, 3000);

        // ----------------------------------------------------
        // [수정 완료] 하이라이트 기능 
        // ----------------------------------------------------
        function showHighlight() {
            if (allStories.length === 0) return;

            isHighlighting = true; // 스크롤 멈춤

            const story = allStories[highlightIndex];
            document.getElementById('highlight-text').innerHTML = `"${story.text.replace(/\n/g, '<br>')}"`;
            document.getElementById('highlight-friend').innerText = `- 나를 도와준 ${story.friend}에게 -`;

            const overlay = document.getElementById('highlight-overlay');
            overlay.classList.add('active');

            setTimeout(() => {
                overlay.classList.remove('active');
                isHighlighting = false; // 팝업 닫히면 스크롤 다시 시작
                
                highlightIndex = (highlightIndex + 1) % allStories.length;
            }, 12000); 
        }

        // 테스트를 위해 처음 팝업은 15초 뒤에 뜨게 설정!
        setTimeout(() => {
            showHighlight();
            // 이후부터는 60초(60000ms)마다 반복!
            setInterval(showHighlight, 60000); 
        }, 15000); 
    </script>
</body>
</html>
