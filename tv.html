<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>무룡고등학교 여름방학 안내</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #2c3e50; /* 어두운 배경으로 TV를 돋보이게 함 */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Noto Sans KR', sans-serif;
            overflow: hidden;
        }

        /* TV 전체 컨테이너 */
        .tv-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* TV 테두리 (베젤) */
        .tv-bezel {
            width: 800px;
            height: 500px;
            background-color: #1a1a1a;
            border-radius: 30px;
            padding: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6), inset 0 5px 15px rgba(255,255,255,0.1);
            position: relative;
        }

        /* TV 화면 내부 */
        .tv-screen {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #e0f7fa 0%, #80deea 100%);
            border-radius: 15px;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 0 25px rgba(0,0,0,0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* 브라운관 TV 스캔라인 효과 */
        .tv-screen::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.05) 50%);
            background-size: 100% 4px;
            z-index: 10;
            pointer-events: none;
        }

        /* TV 켜지는 애니메이션 */
        .content {
            z-index: 5;
            padding: 20px;
            color: #333;
            animation: turnOn 1.5s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        @keyframes turnOn {
            0% { transform: scale(1, 0.001); opacity: 0; filter: brightness(10); }
            40% { transform: scale(1, 0.001); opacity: 1; filter: brightness(5); }
            100% { transform: scale(1, 1); filter: brightness(1); }
        }

        /* 텍스트 및 이미지 스타일 */
        h1 {
            font-size: 2.8em;
            color: #0277bd;
            margin: 0 0 15px 0;
            font-weight: 900;
            letter-spacing: -1px;
            text-shadow: 2px 2px 4px rgba(255,255,255,0.5);
        }

        .mascot {
            width: 180px;
            margin: 5px 0;
            /* 청룡이가 둥둥 떠다니는 효과 */
            animation: float 3s ease-in-out infinite; 
            filter: drop-shadow(0 10px 8px rgba(0,0,0,0.15));
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        .date-badge {
            font-size: 1.5em;
            font-weight: 700;
            background-color: #ffca28;
            color: #222;
            padding: 12px 30px;
            border-radius: 40px;
            display: inline-block;
            margin: 15px 0;
            box-shadow: 0 5px 15px rgba(255, 202, 40, 0.4);
            border: 3px solid #fff;
        }

        .message {
            font-size: 1.25em;
            line-height: 1.6;
            margin-bottom: 25px;
            font-weight: 500;
            color: #455a64;
        }

        .footer {
            font-size: 1.3em;
            font-weight: 900;
            color: #01579b;
        }

        /* TV 스탠드 (받침대) */
        .tv-stand {
            width: 120px;
            height: 40px;
            background: linear-gradient(to right, #333, #555, #333);
        }

        .tv-base {
            width: 350px;
            height: 15px;
            background-color: #111;
            border-radius: 10px 10px 0 0;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <div class="tv-container">
        <!-- TV 화면 부분 -->
        <div class="tv-bezel">
            <div class="tv-screen">
                <div class="content">
                    <h1>🌊 신나는 여름방학 🌊</h1>
                    
                    <!-- 앞서 언급된 청룡이 마스코트 이미지 -->
                    <img src="image.png" alt="무룡고 청룡 마스코트" class="mascot">
                    
                    <div class="date-badge">7. 22.(오늘) ~ 8. 19.(개학식)</div>
                    
                    <p class="message">
                        우리 마스코트 청룡이처럼 예쁜 여의주(목표)를 하나씩 품고<br>
                        건강하고 알찬 방학 보내시길 바랍니다!
                    </p>
                    
                    <div class="footer">- 무룡고등학교 학생회 올림 -</div>
                </div>
            </div>
        </div>
        
        <!-- TV 받침대 부분 -->
        <div class="tv-stand"></div>
        <div class="tv-base"></div>
    </div>
</body>
</html>
