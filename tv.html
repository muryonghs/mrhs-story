<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>우리의 성장 스토리 - TV</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { 
            font-family: 'Noto Sans KR', sans-serif; 
            background-color: #fdfdfd; 
            color: #333333; 
            margin: 0; 
            padding: 80px 60px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        h1 { 
            font-size: 48px; 
            font-weight: 700; 
            margin-bottom: 70px; 
            letter-spacing: -1.5px; 
            background: linear-gradient(to right, #ff758c 0%, #ff7eb3 100%);
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }
        #tv-list { width: 100%; max-width: 1000px; padding-bottom: 200px; }
        
        .story-card { 
            background-color: #ffffff; 
            padding: 40px; 
            margin-bottom: 40px; 
            border-radius: 25px; 
            border: 1px solid #f0f0f0; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
            position: relative; 
            overflow: hidden; 
            opacity: 0;
            transform: translateY(30px);
            animation: slideUp 0.8s ease forwards;
        }
        .story-card::before { 
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 5px; 
            background: linear-gradient(to right, #ff9a9e 0%, #fad0c4 100%); 
        }
        .text { font-size: 32px; line-height: 1.6; font-weight: 500; margin-bottom: 30px; word-break: keep-all; color: #444444; }
        .friend { color: #888888; font-size: 24px; font-weight: 600; text-align: right; font-style: italic; }

        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* QR 코드 컨테이너 */
        #qr-container {
            position: fixed;
            bottom: 50px;
            right: 50px;
            background: #ffffff;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            text-align: center;
            z-index: 1000;
            border: 2px solid #ffedf0;
        }
        #qr-container p { margin: 0 0 15px 0; font-size: 18px; font-weight: 700; color: #ff758c; letter-spacing: -0.5px; }
        #qrcode { display: flex; justify-content: center; }

        /* 🌟 크게 보기(하이라이트 팝업) 디자인 🌟 */
        #highlight-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(253, 253, 253, 0.96); /* 뒷배경이 살짝 비치는 밝은 배경 */
            z-index: 2000; /* 제일 위에 나타나도록 설정 */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s ease; /* 부드럽게 나타나고 사라짐 */
        }
        #highlight-overlay.active {
            opacity: 1;
        }
        .highlight-card {
            background: white;
            padding: 80px;
            border-radius: 40px;
            box-shadow: 0 25px 60px rgba(255, 117, 140, 0.2);
            max-width: 1200px;
            width: 90%;
            text-align: center;
            border: 3px solid #ff758c;
            transform: scale(0.9);
            transition: transform 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #highlight-overlay.active .highlight-card {
            transform: scale(1); /* 나타날 때 살짝 커지는 쫀득한 효과 */
        }
        #highlight-text {
            font-size: 55px; /* 글씨를 매우 크게 */
            line-height: 1.5;
            color: #222;
            margin-bottom: 50px;
            word-break: keep-all;
            font-weight: 700;
        }
        #highlight-friend {
            font-size: 38px;
            color: #ff758c;
            font-weight: 700;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
    <h1>🌟 우리의 실패와 성장 스토리 🌟</h1>
    <div id="tv-list"></div>

    <div id="qr-container">
        <p>스캔하여 사연 남기기</p>
        <div id="qrcode"></div>
    </div>

    <div id="highlight-overlay">
        <div class="highlight-card">
            <div id="highlight-text">"사연 내용이 들어갑니다."</div>
            <div id="highlight-friend">- 나를 도와준 친구에게 -</div>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://tjeyaqrxepbjyhgeaxwp.supabase.co';
        const supabaseKey = 'sb_publishable_dvsOaA9JN3S6Mk11WKJOOQ_uIib6Cia';
        const db = window.supabase.createClient(supabaseUrl, supabaseKey);
        const tvListDiv = document.getElementById('tv-list');

        const qrLink = "https://muryonghs.github.io/mrhs-story/"; 
        new QRCode(document.getElementById("qrcode"), {
            text: qrLink, width: 150, height: 150, 
            colorDark : "#333333", colorLight : "#ffffff", 
            correctLevel : QRCode.CorrectLevel.H 
        });

        // 사연 데이터를 저장해둘 배열과 변수들
        let allStories = [];
        let isHighlighting = false; // 지금 크게 보기가 켜져 있는지 확인
        let highlightIndex = 0;     // 몇 번째 사연을 크게 띄울지 순서

        async function fetchStories() {
            const { data, error } = await db
                .from('stories')
                .select('*')
                .order('created_at', { ascending: false }); 
            
            if (data) {
                allStories = data; // 가져온 데이터를 배열에 저장
                tvListDiv.innerHTML = '';
                data.forEach((story, index) => {
                    const div = document.createElement('div');
                    div.className = 'story-card';
                    div.style.animationDelay = `${index * 0.3}s`;
                    div.innerHTML = `
                        <div class="text">"${story.text.replace(/\n/g, '<br>')}"</div>
                        <div class="friend">- 나를 도와준 ${story.friend}에게 -</div>
                    `;
                    tvListDiv.appendChild(div);
                });
            }
        }

        fetchStories();

        db.channel('public:stories')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'stories' }, payload => {
                fetchStories();
            })
            .subscribe();

        // ----------------------------------------------------
        // [기능 1] 오토 스크롤 기능 (끝나면 위로 올리기)
        // ----------------------------------------------------
        function startAutoScroll() {
            setInterval(() => {
                if (isHighlighting) return; // 크게 보기가 켜져 있으면 스크롤을 잠시 멈춥니다!

                const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
                if (maxScroll > 0) { 
                    // 끝까지 스크롤 되었을 때 맨 위로 올리기
                    if (window.scrollY + 1 >= maxScroll) {
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    } else {
                        window.scrollBy(0, 1);
                    }
                }
            }, 30);
        }

        setTimeout(startAutoScroll, 3000);

        // ----------------------------------------------------
        // [기능 2] 60초마다 사연 크게 띄워주기 (하이라이트 기능)
        // ----------------------------------------------------
        function showHighlight() {
            // 사연이 하나도 없으면 실행하지 않음
            if (allStories.length === 0) return;

            isHighlighting = true; // 스크롤 멈춤 작동

            // 순서대로 사연 하나를 선택합니다.
            const story = allStories[highlightIndex];

            // 팝업 화면에 글씨 교체
            document.getElementById('highlight-text').innerHTML = `"${story.text.replace(/\n/g, '<br>')}"`;
            document.getElementById('highlight-friend').innerText = `- 나를 도와준 ${story.friend}에게 -`;

            // 팝업 화면에 띄우기
            const overlay = document.getElementById('highlight-overlay');
            overlay.classList.add('active');

            // 12초 뒤에 팝업을 닫고 다시 원래 스크롤로 돌아감
            setTimeout(() => {
                overlay.classList.remove('active');
                isHighlighting = false; // 스크롤 다시 시작
                
                // 다음 번엔 그다음 사연을 띄우기 위해 숫자 1 증가 (끝까지 가면 다시 처음으로)
                highlightIndex = (highlightIndex + 1) % allStories.length;
            }, 12000); // 12000 = 12초 동안 보여줌 (원하시면 수정 가능합니다)
        }

        // 60000 밀리초(60초) 마다 크게 보기 기능 실행
        setInterval(showHighlight, 60000);
    </script>
</body>
</html>
