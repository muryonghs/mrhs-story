<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>우리의 성장 스토리 - TV</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { 
            font-family: 'Noto Sans KR', sans-serif; 
            background-color: #121212; /* 눈이 편안한 깊은 다크 배경 */
            color: #e0e0e0; 
            margin: 0; 
            padding: 80px 60px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        h1 { 
            font-size: 48px; 
            font-weight: 700; 
            margin-bottom: 70px; 
            letter-spacing: -1.5px; 
            background: linear-gradient(to right, #ff9a9e 0%, #fad0c4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        #tv-list { width: 100%; max-width: 1000px; }
        
        /* 감성적인 다크 카드 스타일 */
        .story-card { 
            background-color: #1e1e1e;
            padding: 40px; 
            margin-bottom: 40px; 
            border-radius: 25px; 
            border: 1px solid #333;
            transition: all 0.5s ease; /* 새로운 사연 등장 시 부드러운 효과 */
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }
        /* 테두리 그라데이션 포인트 */
        .story-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 5px;
            background: linear-gradient(to right, #ff9a9e 0%, #fad0c4 100%);
        }

        .text { 
            font-size: 32px; 
            line-height: 1.6; 
            font-weight: 500; 
            margin-bottom: 30px; 
            word-break: keep-all; 
            color: #ffffff;
        }
        .friend { 
            color: #aaa;
            font-size: 24px; 
            font-weight: 600; 
            text-align: right; 
            font-style: italic;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
    <h1>🌟 우리의 실패와 성장 스토리 🌟</h1>
    <div id="tv-list"></div>

    <script>
        const supabaseUrl = 'https://tjeyaqrxepbjyhgeaxwp.supabase.co';
        const supabaseKey = 'sb_publishable_dvsOaA9JN3S6Mk11WKJOOQ_uIib6Cia';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);
        const tvListDiv = document.getElementById('tv-list');

        async function fetchStories() {
            const { data, error } = await supabase
                .from('stories')
                .select('*')
                .order('created_at', { ascending: false }); 
            
            if (data) {
                tvListDiv.innerHTML = '';
                data.forEach(story => {
                    const div = document.createElement('div');
                    div.className = 'story-card';
                    div.innerHTML = `
                        <div class="text">"${story.text.replace(/\n/g, '<br>')}"</div>
                        <div class="friend">- 나를 도와준 ${story.friend}에게 -</div>
                    `;
                    tvListDiv.appendChild(div);
                });
            }
        }

        fetchStories();

        supabase
            .channel('public:stories')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'stories' }, payload => {
                fetchStories();
            })
            .subscribe();
    </script>
</body>
</html>
