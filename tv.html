<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>우리의 성장 스토리 - TV</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        /* 기본 설정 변경: 전체 화면 고정, 내부 스크롤 사용 */
        body { 
            font-family: 'Noto Sans KR', sans-serif; 
            background-color: #fdfdfd; 
            color: #333333; 
            margin: 0; 
            padding: 0;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            height: 100vh; /* 화면 전체 높이 사용 */
            overflow: hidden; /* body 자체의 스크롤 방지 */
        }

        /* 상단 고정 영역 (제목 + 경고문) */
        #header-container {
            width: 100%;
            text-align: center;
            padding: 50px 20px 20px 20px;
            background-color: #fdfdfd;
            z-index: 100;
        }

        h1 { 
            font-size: 48px; 
            font-weight: 700; 
            margin: 0 0 15px 0; 
            letter-spacing: -1.5px; 
            background: linear-gradient(to right, #ff758c 0%, #ff7eb3 100%);
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }

        /* 경고 멘트 스타일 */
        .warning-text {
            color: #e74c3c;
            font-size: 20px;
            font-weight: 700;
            margin: 0;
            letter-spacing: -0.5px;
        }

        /* 스크롤되는 사연 목록 영역 */
        #scroll-container {
            width: 100%;
            flex: 1; /* 남은 화면 높이를 모두 차지 */
            overflow-y: auto; /* 내용이 넘치면 세로 스크롤 생성 */
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 30px;
        }

        /* 스크롤바 숨기기 (깔끔한 TV 화면을 위해) */
        #scroll-container::-webkit-scrollbar {
            display: none;
        }
        #scroll-container {
            -ms-overflow-style: none; /* IE and Edge */
            scrollbar-width: none; /* Firefox */
        }

        #tv-list { 
            width: 100%; 
            max-width: 1000px; 
            padding-bottom: 200px; 
        }
        
        .story-card { 
            background-color: #ffffff; 
            padding: 40px; 
            margin-bottom: 40px; 
            border-radius: 25px; 
            border: 1px solid #f0f0f0; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
            position: relative; 
            overflow: hidden; 
            opacity: 0;
            transform: translateY(30px);
            animation: slideUp 0.8s ease forwards;
        }
        .story-card::before { 
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 5px; 
            background: linear-gradient(to right, #ff9a9e 0%, #fad0c4 100%); 
        }
        .text { font-size: 32px; line-height: 1.6; font-weight: 500; margin-bottom: 30px; word-break: keep-all; color: #444444; }
        .friend { color: #888888; font-size: 24px; font-weight: 600; text-align: right; font-style: italic; }

        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* QR 코드 컨테이너 */
        #qr-container {
            position: fixed;
            bottom: 50px;
            right: 50px;
            background: #ffffff;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            text-align: center;
            z-index: 1000;
            border: 2px solid #ffedf0;
        }
        #qr-container p { margin: 0 0 15px 0; font-size: 18px; font-weight: 700; color: #ff758c; letter-spacing: -0.5px; }
        #qrcode { display: flex; justify-content: center; }

        /* 🌟 크게 보기(하이라이트 팝업) 디자인 🌟 */
        #highlight-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(253, 253, 253, 0.96); 
            z-index: 2000; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden; 
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        #highlight-overlay.active {
            opacity: 1;
            visibility: visible; 
        }
        .highlight-card {
            background: white;
            padding: 80px;
            border-radius: 40px;
            box-shadow: 0 25px 60px rgba(255, 117, 140, 0.2);
            max-width: 1200px;
            width: 90%;
            text-align: center;
            border: 3px solid #ff758c;
            transform: scale(0.9);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #highlight-overlay.active .highlight-card {
            transform: scale(1); 
        }
        #highlight-text {
            font-size: 55px; 
            line-height: 1.5;
            color: #222;
            margin-bottom: 50px;
            word-break: keep-all;
            font-weight: 700;
        }
        #highlight-friend {
            font-size: 38px;
            color: #ff758c;
            font-weight: 700;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="header-container">
        <h1>🌟 우리의 실패와 성장 스토리 🌟</h1>
        <p class="warning-text">⚠️ 실시간으로 엄격히 관리되고 있습니다. 부적절한 발언은 추후 큰 불이익이 됩니다.</p>
    </div>

    <div id="scroll-container">
        <div id="tv-list"></div>
    </div>

    <div id="qr-container">
        <p>스캔하여 사연 남기기</p>
        <div id="qrcode"></div>
    </div>

    <div id="highlight-overlay">
        <div class="highlight-card">
            <div id="highlight-text">"사연 내용이 들어갑니다."</div>
            <div id="highlight-friend">- 나를 도와준 친구에게 -</div>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://tjeyaqrxepbjyhgeaxwp.supabase.co';
        const supabaseKey = 'sb_publishable_dvsOaA9JN3S6Mk11WKJOOQ_uIib6Cia';
        const db = window.supabase.createClient(supabaseUrl, supabaseKey);
        
        const scrollContainer = document.getElementById('scroll-container');
        const tvListDiv = document.getElementById('tv-list');

        const qrLink = "https://muryonghs.github.io/mrhs-story/"; 
        new QRCode(document.getElementById("qrcode"), {
            text: qrLink, width: 150, height: 150, 
            colorDark : "#333333", colorLight : "#ffffff", 
            correctLevel : QRCode.CorrectLevel.H 
        });

        let allStories = [];
        let isHighlighting = false; 
        let isScrollingUp = false;

        async function fetchStories() {
            const { data, error } = await db
                .from('stories')
                .select('*')
                .order('created_at', { ascending: false }); 
            
            if (data) {
                allStories = data; 
                tvListDiv.innerHTML = '';
                data.forEach((story, index) => {
                    const div = document.createElement('div');
                    div.className = 'story-card';
                    div.style.animationDelay = `${index * 0.3}s`;
                    div.innerHTML = `
                        <div class="text">"${story.text.replace(/\n/g, '<br>')}"</div>
                        <div class="friend">- 나를 도와준 ${story.friend}에게 -</div>
                    `;
                    tvListDiv.appendChild(div);
                });
            }
        }

        fetchStories();

        db.channel('public:stories')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'stories' }, payload => {
                fetchStories();
            })
            .subscribe();

        // ----------------------------------------------------
        // 특정 영역(scroll-container)만 오토 스크롤 되도록 변경
        // ----------------------------------------------------
        function startAutoScroll() {
            setInterval(() => {
                if (isHighlighting || isScrollingUp) return; 

                // window 대신 scrollContainer의 스크롤 위치를 계산합니다.
                const currentScroll = Math.ceil(scrollContainer.scrollTop); 
                const maxScroll = scrollContainer.scrollHeight - scrollContainer.clientHeight;

                if (maxScroll > 0) { 
                    if (currentScroll >= maxScroll - 2) {
                        isScrollingUp = true; 
                        scrollContainer.scrollTo({ top: 0, behavior: 'smooth' });
                        
                        setTimeout(() => {
                            isScrollingUp = false;
                        }, 1500);
                    } else {
                        scrollContainer.scrollBy(0, 1);
                    }
                }
            }, 30);
        }

        setTimeout(startAutoScroll, 3000);

        // ----------------------------------------------------
        // 모든 사연을 5초씩 보여주는 하이라이트 기능
        // ----------------------------------------------------
        // 자바스크립트의 Promise를 활용해 타이머를 만듭니다.
        const delay = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        async function playAllHighlights() {
            if (allStories.length === 0 || isHighlighting) return;

            isHighlighting = true; // 스크롤 정지
            const overlay = document.getElementById('highlight-overlay');
            overlay.classList.add('active'); // 팝업 띄우기

            // 모든 사연을 순서대로 반복합니다.
            for (let i = 0; i < allStories.length; i++) {
                const story = allStories[i];
                
                // 화면에 사연 적용
                document.getElementById('highlight-text').innerHTML = `"${story.text.replace(/\n/g, '<br>')}"`;
                document.getElementById('highlight-friend').innerText = `- 나를 도와준 ${story.friend}에게 -`;
                
                // 5초(5000ms) 대기 후 다음 사연으로 넘어갑니다.
                await delay(5000); 
            }

            // 모든 사연이 끝나면 팝업을 닫고 스크롤 재개
            overlay.classList.remove('active');
            isHighlighting = false; 
        }

        // 1분(60초)마다 전체 하이라이트 재생 실행
        setInterval(() => {
            playAllHighlights();
        }, 60000); 

    </script>
</body>
</html>
